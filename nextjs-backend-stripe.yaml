namespace: nextjs-backend-stripe

postgres:
  defines: runnable
  inherits: postgresql/db-v16
  variables:
    db_user:
      type: string
      value: monk
      env: POSTGRES_USER
    db_pass:
      type: string
      value: <- secret("postgres-password")
      env: POSTGRES_PASSWORD
    db_name:
      type: string
      value: monk_demo
      env: POSTGRES_DB
  permitted-secrets:
    postgres-password: true

app:
  defines: runnable
  containers:
    app:
      image: nextjs-backend-stripe:latest
  services:
    http:
      container: app
      port: 3000
      protocol: tcp
      ingress-routes:
        app:
          path-prefix: /
  connections:
    database:
      target: nextjs-backend-stripe/postgres
      service: postgres
  depends:
    wait-for:
      runnables:
        - nextjs-backend-stripe/postgres
      timeout: 120
  checks:
    readiness:
      code: http-get-service("nextjs-backend-stripe/app", "http", "/api/health") get-member("status") 200 eq?
      period: 10
      initialDelay: 10
      attempts: 12
  variables:
    port:
      type: string
      value: "3000"
      env: PORT
    hostname:
      type: string
      value: 0.0.0.0
      env: HOSTNAME
    node-env:
      type: string
      value: production
      env: NODE_ENV
    next-public-app-url:
      type: string
      value: http://localhost:3000
      env: NEXT_PUBLIC_APP_URL
    database-host:
      type: string
      value: <- connection-hostname("database")
      env: DATABASE_HOST
    database-port:
      type: int
      value: <- connection-port("database")
      env: DATABASE_PORT
    database-name:
      type: string
      value: monk_demo
      env: DATABASE_NAME
    database-user:
      type: string
      value: monk
      env: DATABASE_USER
    database-password:
      type: string
      value: <- secret("postgres-password")
      env: DATABASE_PASSWORD
    database-ssl:
      type: string
      value: "false"
      env: DATABASE_SSL
    database-auto-init:
      type: string
      value: "true"
      env: DATABASE_AUTO_INIT
    stripe-secret-key:
      type: string
      value: <- secret("stripe-secret-key")
      env: STRIPE_SECRET_KEY
    stripe-publishable-key:
      type: string
      value: <- secret("stripe-publishable-key")
      env: STRIPE_PUBLISHABLE_KEY
    stripe-account-id:
      type: string
      value: ""
      env: STRIPE_ACCOUNT_ID
    stripe-mode:
      type: string
      value: test
      env: STRIPE_MODE
    stripe-webhook-secret:
      type: string
      value: <- secret("stripe-webhook-secret")
      env: STRIPE_WEBHOOK_SECRET
    stripe-product-id:
      type: string
      value: ""
      env: STRIPE_PRODUCT_ID
    stripe-price-id:
      type: string
      value: ""
      env: STRIPE_PRICE_ID
  permitted-secrets:
    postgres-password: true
    stripe-secret-key: true
    stripe-publishable-key: true
    stripe-webhook-secret: true

nextjs-backend-stripe-stack:
  defines: group
  members:
    - nextjs-backend-stripe/postgres
    - nextjs-backend-stripe/app